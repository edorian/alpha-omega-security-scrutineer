name: CI

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-logic:
    name: release logic
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Set up Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Test release resolver
        run: scripts/release-resolver_test.sh

  tests:
    name: tests (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: ["ubuntu-24.04", "macos-26"]
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Set up Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      # Restore on every run, but save only on pushes to main (see the save step
      # below). A pull request reuses main's cache without writing a branch-scoped
      # entry that no other ref can restore and that evicts the shared cache.
      - name: Restore Go caches
        id: go-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # ~/.cache/go-build is Go's build cache on Linux; ~/Library/Caches/go-build
          # is its macOS equivalent. Paths that don't exist on a platform are skipped.
          path: |
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ github.job }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ github.job }}-

      - name: Verify Go modules are tidy
        run: go mod tidy -diff

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      # The podman integration tests are behind //go:build podman and are not
      # built by the steps above; vet them under the tag so they can't silently
      # rot (podman itself is not needed -- the tests skip at run time without it).
      - name: Vet podman integration tests
        run: go vet -tags podman ./...

      - name: Save Go caches
        if: github.event_name == 'push' && steps.go-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~/go/pkg/mod
          key: ${{ steps.go-cache.outputs.cache-primary-key }}

  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Set up Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go caches
        id: go-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ github.job }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ github.job }}-

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0

      - name: Save Go caches
        if: github.event_name == 'push' && steps.go-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ steps.go-cache.outputs.cache-primary-key }}

  vuln:
    name: vuln
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Set up Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go caches
        id: go-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ github.job }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ github.job }}-

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Scan for known vulnerabilities
        run: govulncheck ./...

      - name: Save Go caches
        if: github.event_name == 'push' && steps.go-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ steps.go-cache.outputs.cache-primary-key }}

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Set up Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pipx install zizmor==1.26.1

      - name: Audit GitHub Actions
        run: zizmor --persona auditor .github/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  conclusion:
    name: conclusion
    needs: [release-logic, tests, lint, vuln, zizmor]
    if: always()
    runs-on: ubuntu-slim
    timeout-minutes: 15
    permissions: {}
    steps:
      - name: Result
        env:
          RELEASE_LOGIC_RESULT: ${{ needs.release-logic.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          VULN_RESULT: ${{ needs.vuln.result }}
          ZIZMOR_RESULT: ${{ needs.zizmor.result }}
        run: |
          [[ "${RELEASE_LOGIC_RESULT}" == success ]]
          [[ "${TESTS_RESULT}" == success ]]
          [[ "${LINT_RESULT}" == success ]]
          [[ "${VULN_RESULT}" == success ]]
          [[ "${ZIZMOR_RESULT}" == success ]]
